version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: it-dashboard-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=itdashboarddb
      - POSTGRES_PASSWORD=YKEzHTQxnxjxa6QG
      - POSTGRES_DB=itdashboarddb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: it-dashboard-backend
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL:-host=postgres user=ottodb password=YKEzHTQxnxjxa6QG dbname=ottodb port=5432 sslmode=disable}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-this-in-production}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: it-dashboard-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:

