      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.System'
        "400":
          description: 'error: Bad request'
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 'error: Id not found'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Failed to update database'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a system
      tags:
      - systems
  /api/systems/{id}/documentations:
    get:
      description: Get a list of documentations associated with a system ID, optionally
        filtered by category
      parameters:
      - description: System ID
        in: path
        name: id
        required: true
        type: integer
      - description: Optional category filter
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
