      tags:
      - servers
  /api/systems:
    get:
      description: |-
        Get a list of all systems
        Get a list of all systems
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.System'
            type: array
      summary: Get all systems
      tags:
      - systems
    post:
      consumes:
      - application/json
      description: Create a new system database entry by providing system fields
      parameters:
      - description: System creation payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateSystemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.System'
        "400":
          description: 'error: Invalid request body'
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 'error: Server not found'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Failed to create system'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new system
      tags:
      - systems
  /api/systems/{id}:
    delete:
      description: Delete a system record and its related notes/features from database
      parameters:
      - description: System ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'message: Delete successfully'
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 'error: Id not found'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Failed to delete data'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a system
      tags:
      - systems
    get:
      description: Get detailed information of a system including server
      parameters:
      - description: System ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.System'
        "404":
          description: 'error: Id not found'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get system by ID
      tags:
      - systems
    put:
      consumes:
      - application/json
      description: Update details of an existing system by ID
      parameters:
      - description: System ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
