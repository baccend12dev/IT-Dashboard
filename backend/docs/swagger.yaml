      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Note'
            type: array
        "500":
          description: 'error: Gagal mengambil catatan'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get notes by system ID
      tags:
      - notes
    post:
      consumes:
      - application/json
      description: |-
        Create a new note for a system by providing the system ID and note content
        Create a new note for a system
      parameters:
      - description: System ID
