      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.FeatureRequest'
        "400":
          description: 'error: ID System tidak valid / Invalid request body'
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 'error: System tidak ditemukan'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: Gagal menyimpan ke database'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new feature request
      tags:
      - feature-requests
  /api/systems/{id}/notes:
    get:
      description: Get a list of notes associated with a specific system
      parameters:
      - description: System ID
        in: path
        name: id
        required: true
        type: integer
      produces:
