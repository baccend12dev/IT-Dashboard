<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> <!-- Purple -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Emerald -->
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Glowing Hexagon / Shield -->
  <path d="M256 32 L448 128 L448 384 L256 480 L64 384 L64 128 Z" fill="url(#shieldGrad)" stroke="url(#neonGrad)" stroke-width="12" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Grid patterns inside -->
  <path d="M120 160 L392 160 M120 224 L392 224 M120 288 L392 288 M120 352 L392 352" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M160 120 L160 392 M224 120 L224 392 M288 120 L288 392 M352 120 L352 392" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Server Racks / Data blocks in center -->
  <!-- Server 1 -->
  <rect x="140" y="170" width="232" height="40" rx="8" fill="#1e293b" stroke="url(#neonGrad)" stroke-width="3" />
  <circle cx="170" cy="190" r="6" fill="#10b981" /> <!-- Green active LED -->
  <circle cx="190" cy="190" r="6" fill="#3b82f6" /> <!-- Blue active LED -->
  <rect x="220" y="186" width="100" height="8" rx="4" fill="#475569" />
  <rect x="330" y="184" width="24" height="12" rx="2" fill="#06b6d4" />

  <!-- Server 2 -->
  <rect x="140" y="236" width="232" height="40" rx="8" fill="#1e293b" stroke="url(#neonGrad)" stroke-width="3" />
  <circle cx="170" cy="256" r="6" fill="#10b981" />
  <circle cx="190" cy="256" r="6" fill="#f59e0b" /> <!-- Yellow active LED -->
  <rect x="220" y="252" width="100" height="8" rx="4" fill="#475569" />
  <rect x="330" y="250" width="24" height="12" rx="2" fill="#a855f7" />

  <!-- Server 3 -->
  <rect x="140" y="302" width="232" height="40" rx="8" fill="#1e293b" stroke="url(#neonGrad)" stroke-width="3" />
  <circle cx="170" cy="322" r="6" fill="#ef4444" /> <!-- Red alert LED -->
  <circle cx="190" cy="322" r="6" fill="#3b82f6" />
  <rect x="220" y="318" width="100" height="8" rx="4" fill="#475569" />
  <rect x="330" y="316" width="24" height="12" rx="2" fill="#ef4444" />

  <!-- Connection Nodes -->
  <path d="M120 120 L200 80 L312 80 L392 120" fill="none" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
  <circle cx="200" cy="80" r="8" fill="#a855f7" />
  <circle cx="312" cy="80" r="8" fill="#06b6d4" />

  <path d="M120 392 L200 432 L312 432 L392 392" fill="none" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
  <circle cx="200" cy="432" r="8" fill="#06b6d4" />
  <circle cx="312" cy="432" r="8" fill="#a855f7" />
</svg>